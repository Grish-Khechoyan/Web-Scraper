name: Build and scan Docker image

on:
  workflow_call:
    inputs:
      image:
        description: Image name with tag
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

    outputs:
      image:
        description: Full Docker image
        value: ${{ jobs.build.outputs.image }}
      repository:
        description: Repository
        value: ${{ jobs.build.outputs.repository }}
      tag:
        description: Tag
        value: ${{ jobs.build.outputs.tag }}

jobs:
  build:
    runs-on: self-hosted

    outputs:
      image: ${{ steps.meta.outputs.image }}
      repository: ${{ steps.meta.outputs.repository }}
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker login
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
            -u "${{ secrets.DOCKERHUB_USERNAME }}" \
            --password-stdin

      - name: Create image name
        id: meta
        shell: bash
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image }}"

          if [ -z "$IMAGE" ]; then
            echo "ERROR: Image name is empty"
            exit 1
          fi

          echo "IMAGE=$IMAGE"

          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "repository=${IMAGE%:*}" >> "$GITHUB_OUTPUT"
          echo "tag=${IMAGE##*:}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            -t "${{ steps.meta.outputs.image }}" \
            .

      - name: Verify image exists
        run: |
          docker images
          docker image inspect "${{ steps.meta.outputs.image }}"

      - name: Push Docker image
        run: |
          docker push "${{ steps.meta.outputs.image }}"


  scan:
    needs: build
    runs-on: self-hosted

    steps:
      - name: Verify image variable
        run: |
          echo "Scanning:"
          echo "${{ needs.build.outputs.image }}"

          if [ -z "${{ needs.build.outputs.image }}" ]; then
            echo "ERROR: image output is empty"
            exit 1
          fi

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ needs.build.outputs.image }}"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"