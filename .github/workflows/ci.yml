name: Genesis CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-push:
    runs-on: self-hosted
    env:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate DockerHub token
        if: github.event_name == 'push' && env.DOCKERHUB_TOKEN == ''
        run: |
          echo "::error::Missing repository secret DOCKERHUB_TOKEN. Add it in GitHub: Settings > Secrets and variables > Actions > New repository secret."
          exit 1

      - name: Login to DockerHub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: devopsbotjob
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t devopsbotjob/genesis:${{ github.sha }} .

      - name: Push Docker image
        if: github.event_name == 'push'
        run: |
          # 1. Push the specific commit SHA version
          docker push devopsbotjob/genesis:${{ github.sha }}
          
          # 2. Create the latest tag pointing to that image
          docker tag devopsbotjob/genesis:${{ github.sha }} devopsbotjob/genesis:latest
          
          # 3. CRITICAL: You must explicitly push the latest tag too!
          docker push devopsbotjob/genesis:latest
