name: Genesis CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted
    strategy:
      matrix:
        python: ['3.11', '3.12']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

  build:
    needs: test
    runs-on: self-hosted
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build & push
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/genesis:${GITHUB_SHA::7} .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/genesis:${GITHUB_SHA::7}

  deploy:
    needs: build
    runs-on: self-hosted
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Minikube
        run: |
          helm upgrade --install genesis ./genesis-chart \
            --set image.repository=${{ secrets.DOCKERHUB_USERNAME }}/genesis \
            --set image.tag=${{ needs.build.outputs.tag }}
          kubectl rollout status deploy/genesis
