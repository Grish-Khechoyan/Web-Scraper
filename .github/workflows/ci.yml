name: Genesis CI/CD

"on":
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
        name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        # Make sure DOCKERHUB_TOKEN is exactly named in your GitHub repository secrets!
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u devopsbotjob --password-stdin

      - name: Build Docker image
        run: docker build -t devopsbotjob/genesis:${{ github.sha }} .

      - name: Push Docker image
        run: |
          # 1. Push the specific commit SHA version
          docker push devopsbotjob/genesis:${{ github.sha }}
          
          # 2. Create the latest tag pointing to that image
          docker tag devopsbotjob/genesis:${{ github.sha }} devopsbotjob/genesis:latest
          
          # 3. CRITICAL: You must explicitly push the latest tag too!
          docker push devopsbotjob/genesis:latest
