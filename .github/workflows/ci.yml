name: Genesis CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: self-hosted

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          if python -m pytest -q tests; then
            echo "Tests passed"
          else
            status=$?
            if [ "$status" -eq 5 ]; then
              echo "No tests were collected; treating as success."
            else
              exit "$status"
            fi
          fi

  delivery:
    needs: test
    uses: ./.github/workflows/build-scan.yml
    with:
      image: genesis:${{ github.sha }}
    secrets: inherit

  

  deploy:
    needs: delivery
    runs-on: self-hosted
    environment: staging

  steps:
      - uses: actions/checkout@v4

      - name: Deploy with Helm
      run: |
        helm upgrade --install genesis ./genesis-chart \
          --set image.repository=${{ needs.delivery.outputs.repository }} \
          --set image.tag=${{ needs.delivery.outputs.tag }}

      - name: Rollout status
          run: |
        kubectl rollout status deployment/genesis