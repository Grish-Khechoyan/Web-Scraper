name: Genesis CI/CD

"on":
 push:
   branches: [main]

jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u devopsbotjob --password-stdin

      - name: Build Docker image
        run: docker build -t devopsbotjob/genesis:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker tag devopsbotjob/genesis:${{ github.sha }} devopsbotjob/genesis:latest
          docker push devopsbotjob/genesis:${{ github.sha }}
