name: Genesis CI/CD

"on":
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: self-hosted
    environment: devopsbotjob
    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "Missing DOCKERHUB_USERNAME or DOCKERHUB_TOKEN secret."
            exit 1
          fi

          printf '%s' "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/genesis:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/genesis:${{ github.sha }}
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/genesis:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/genesis:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/genesis:latest
