name: Genesis CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted
    strategy:
      matrix:
        python: ['3.12']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: |
          if python -m pytest -q tests; then
            echo "Tests passed"
          else
            status=$?
            if [ "$status" -eq 5 ]; then
              echo "No tests were collected; treating as success for now"
            else
              exit "$status"
            fi
          fi

  delivery:
    needs: test
    uses: ./.github/workflows/build-scan.yml
    with:
      image: ${{ secrets.DOCKERHUB_USERNAME }}/genesis:${{ github.sha }}
    secrets: inherit

  deploy:
    needs: delivery
    runs-on: self-hosted
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Minikube
        run: |
          if ! kubectl cluster-info >/dev/null 2>&1; then
            echo "Kubernetes cluster is not reachable. Skipping deployment."
            exit 0
          fi
          helm upgrade --install genesis ./genesis-chart \
            --set image.repository=${{ secrets.DOCKERHUB_USERNAME }}/genesis \
            --set image.tag=${{ needs.delivery.outputs.tag }}
          kubectl rollout status deploy/genesis
