apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: genesis
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Grish-Khechoyan/Web-Scraper.git
    targetRevision: main
    path: genesis-chart
    helm:
      values: |
        replicaCount: 2
        image:
          repository: nginx
          tag: latest
        service:
          port: 80
  destination:
    server: https://kubernetes.default.svc
    namespace: genesis
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
