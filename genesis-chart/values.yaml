replicaCount: 1

image:
  repository: nginx
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80
  targetPort: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: genesis.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

config:
  APP_ENV: production
  LOG_LEVEL: info

secret:
  enabled: true
  data:
    username: ""
    password: ""

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
