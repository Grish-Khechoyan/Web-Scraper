version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webscraper-backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://webscraper_user:strong_password@db:5432/webscraper
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: webscraper-db
    environment:
      POSTGRES_DB: webscraper
      POSTGRES_USER: webscraper_user
      POSTGRES_PASSWORD: strong_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
